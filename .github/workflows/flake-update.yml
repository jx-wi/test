name: flake update

# Weekly `nix flake update` (bumps the nixpkgs lock) → opens a PR for MANUAL review/merge.
# Deliberately does NOT auto-merge (unlike the sibling repos): flake check builds + runs the
# host tests but does NOT boot a VM (tests/boot.sh isn't in CI), so a green check can't catch a
# nixpkgs bump that breaks guest boot/runtime — and ccvm's `main` is what users `nix run`. A
# human merges after eyeballing the bump (and, ideally, a local boot.sh). Revisit auto-merge
# once there's a KVM runner gating the merge on boot.sh.

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 6 AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (Jan 2026)
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22 (Mar 2026)
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13 (Jul 2025)
        continue-on-error: true
      - name: nix flake update
        run: nix flake update
      - name: create pull request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1 (Apr 2026)
        with:
          token: ${{ secrets.PAT }}
          commit-message: "flake: update inputs"
          title: "flake: update inputs"
          branch: flake-update/auto
          delete-branch: true
          body: |
            Automated `nix flake update` via CI. **Merge manually** after review — ideally a
            local `bash tests/boot.sh` pass, since CI's `flake check` does not boot a VM.
            Generated by GitHub Actions.
