name: check

# Builds the guest image, shellchecks the wrapper (via writeShellApplication), and runs
# the host-side guarantee tests (secret hygiene, config staging, verbatim argv, mode
# selection) — i.e. `nix flake check`. The full-boot smoke test (tests/boot.sh) needs a
# working VM and is run locally, not here.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  flake-check:
    name: nix flake check (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (flakes enabled)
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Cache the Nix store between runs
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix flake check
        run: nix flake check -L
